version: '3.8'

services:
  tg-monitor:
    build: .
    container_name: tg-monitor
    ports:
      - "8080:8080"
    volumes:
      # Persist database, session files, and report images
      - tg-monitor-data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  tg-monitor-data:
