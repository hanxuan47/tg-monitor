networks:
    1panel-network:
        external: true

services:
    tg-monitor:
        container_name: ${CONTAINER_NAME}
        build:
            context: .
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            - TZ=Asia/Shanghai
        labels:
            createdBy: Apps
        networks:
            - 1panel-network
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:8080
        restart: always
        user: "0:0"
        volumes:
            - ./data:/app/data
